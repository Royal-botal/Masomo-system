<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Sign Up - Masomo Track</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-card">
        <h1>Institution Sign Up</h1>
        <p>Create an institution account (example: KCAU).</p>
        <p id="backend-status" class="status-check">Checking backend status...</p>
        <form id="signin-form">
            <label for="institution_name">Institution Name</label>
            <input id="institution_name" required placeholder="KCA University">

            <label for="org_code">Institution Code</label>
            <input id="org_code" required placeholder="KCAU">

            <label for="admin_name">Admin Full Name</label>
            <input id="admin_name" required placeholder="KCA Admin">

            <label for="email">Admin Email</label>
            <input id="email" type="email" required placeholder="admin@kcau.ac.ke">

            <label for="password">Password</label>
            <input id="password" type="password" required placeholder="Choose password">

            <button type="submit">Create Institution</button>
        </form>
        <div id="signin-message"></div>
        <p class="note">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script src="signin.js"></script>
</body>
</html>
